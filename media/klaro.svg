<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="kbg" x1="0" y1="0" x2="1280" y2="800" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1607"/>
      <stop offset="100%" stop-color="#0b0b14"/>
    </linearGradient>
    <radialGradient id="kglow" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="kaccent" x1="0" y1="0" x2="1280" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <pattern id="kgrid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1280" height="800" fill="url(#kbg)"/>
  <rect width="1280" height="800" fill="url(#kgrid)"/>
  <rect width="1280" height="800" fill="url(#kglow)"/>
  <g transform="translate(640,360)" text-anchor="middle">
    <text y="0" font-family="'Space Grotesk', 'Inter', system-ui, sans-serif" font-weight="600" font-size="120" letter-spacing="-4" fill="#f5f3ee">Klaro</text>
    <text y="78" font-family="'Space Grotesk', 'Inter', system-ui, sans-serif" font-weight="500" font-size="42" letter-spacing="22" fill="url(#kaccent)">A C A D E M Y</text>
    <line x1="-120" y1="130" x2="120" y2="130" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <text y="180" font-family="'Inter', system-ui, sans-serif" font-weight="400" font-size="22" letter-spacing="6" fill="#a8a39a">OPENING SOON</text>
  </g>
</svg>
